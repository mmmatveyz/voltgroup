<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена | VoltGroup</title>
    <style>
        :root { --bg: #0B1120; --primary: #00E5FF; --text: #F8FAFC; --text-muted: #94A3B8; --radius: 8px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
        .container { max-width: 500px; }
        h1 { font-size: 6rem; color: var(--primary); line-height: 1; margin-bottom: 10px; text-shadow: 0 0 30px rgba(0,229,255,0.3); }
        h2 { font-size: 1.5rem; margin-bottom: 15px; }
        p { color: var(--text-muted); margin-bottom: 30px; line-height: 1.6; }
        .btn { display: inline-block; padding: 12px 24px; background: var(--primary); color: var(--bg); text-decoration: none; border-radius: var(--radius); font-weight: 600; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,229,255,0.25); }
        .logo { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 20px; }
        .logo span { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">⚡ Volt<span>Group</span></div>
    <h1>404</h1>
    <h2>Страница не найдена</h2>
    <p>Возможно, ссылка устарела или вы ввели адрес с ошибкой.<br>Вернитесь на главную, чтобы найти нужную информацию.</p>
    <a href="./index.html" class="btn">← На главную</a>
</div>
</body>
</html>
