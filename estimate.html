<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор сметы | VoltGroup</title>
  <meta name="description" content="Рассчитайте предварительную стоимость электромонтажных работ онлайн. VoltGroup СПб.">

   <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

  <style>
    :root {
      --bg: #0B1120; --surface: #111827; --primary: #00E5FF; --primary-hover: #00B8D4;
      --text: #F8FAFC; --text-muted: #94A3B8; --border: #1E293B; --radius: 8px;
      --font: system-ui, -apple-system, sans-serif;
      --danger: #EF4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); }
    body { background: var(--bg); color: var(--text); line-height: 1.6; padding-bottom: 60px; }

    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

    /* Header & Nav */
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-top: 10px; }
    .btn-nav { text-decoration: none; color: var(--text-muted); display: flex; align-items: center; gap: 5px; font-size: 0.9rem; transition: 0.2s; }
    .btn-nav:hover { color: var(--primary); }
    h1 { font-size: clamp(1.5rem, 4vw, 2rem); color: var(--text); }
    .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-top: 5px; }

    /* Client Info Card */
    .client-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
      background: var(--surface);
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .input-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
    .client-info input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
    }
    .client-info input:focus { outline: none; border-color: var(--primary); }

    /* Tables */
    .table-wrapper {
      overflow-x: auto;
      margin-bottom: 20px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
    th { background: rgba(255,255,255,0.03); color: var(--primary); font-weight: 600; white-space: nowrap; }

    .qty-input { width: 70px; padding: 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text); text-align: center; }
    .name-input { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }

    /* Summary Block */
    .summary {
      background: var(--surface);
      padding: 25px;
      border-radius: var(--radius);
      margin: 30px 0;
      border: 1px solid var(--border);
    }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; color: var(--text-muted); font-size: 1.1rem; }
    .summary-total {
      display: flex;
      justify-content: space-between;
      font-size: 1.6rem;
      font-weight: 700;
      border-top: 2px solid var(--border);
      padding-top: 15px;
      color: var(--primary);
      margin-top: 15px;
    }

    /* Discount Input */
    .discount-block {
      display: flex;
      gap: 10px;
      align-items: center;
      margin: 15px 0;
      padding: 10px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: var(--radius);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .discount-block input { width: 100px; padding: 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }

    /* Buttons */
    .actions { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
    .btn {
      padding: 12px 24px;
      border-radius: var(--radius);
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-size: 1rem;
      transition: 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary { background: var(--primary); color: var(--bg); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
    .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
    .btn-outline:hover { background: var(--primary); color: var(--bg); }
    .btn-remove { background: transparent; border: none; color: var(--danger); cursor: pointer; font-size: 1.2rem; padding: 4px; opacity: 0.7; }
    .btn-remove:hover { opacity: 1; }

    /* Toggle Switch */
    .purchase-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      padding: 12px;
      background: rgba(0, 229, 255, 0.05);
      border-radius: var(--radius);
      border: 1px solid rgba(0, 229, 255, 0.2);
    }
    .purchase-toggle label { cursor: pointer; color: var(--text); font-weight: 600; user-select: none; }
    .purchase-toggle input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }

    @media (max-width: 600px) {
      .client-info { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="top-bar">
    <a href="./index.html" class="btn-nav">← На главную</a>
    <div style="font-weight: 700; color: var(--primary);">VoltGroup</div>
  </div>

  <h1>⚡ Калькулятор сметы</h1>
  <p class="subtitle">Предварительный расчёт стоимости работ и материалов</p>

  <!-- Данные заказчика -->
  <div class="client-info">
    <div class="input-group">
      <label>Имя заказчика</label>
      <input type="text" id="client-name" placeholder="Иванов И.И.">
    </div>
    <div class="input-group">
      <label>Адрес объекта</label>
      <input type="text" id="client-address" placeholder="СПб, ул. Ленина...">
    </div>
    <div class="input-group">
      <label>Дата</label>
      <input type="date" id="estimate-date">
    </div>
    <div class="input-group">
      <label>№ Сметы</label>
      <input type="text" id="invoice-number" placeholder="Авто" readonly style="background: rgba(255,255,255,0.05);">
    </div>
  </div>

  <!-- Управление черновиками -->
  <div style="display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; align-items: center;">
    <input type="text" id="draft-name" placeholder="Название (напр. Квартира на Невском)" style="padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); flex-grow: 1;">
    <button class="btn btn-outline" onclick="saveDraft()" style="padding: 10px 15px; font-size: 0.9rem;">💾 Сохранить</button>
    <select id="draft-select" onchange="loadDraft()" style="padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text);">
      <option value="">📂 Загрузить...</option>
    </select>
    <button class="btn btn-outline" onclick="deleteDraft()" style="padding: 10px 15px; font-size: 0.9rem; color: var(--danger); border-color: var(--danger);">🗑</button>
  </div>

  <!-- Таблица Работ -->
  <div class="table-wrapper">
    <table>
      <thead>
      <tr><th>Наименование работ</th><th>Ед.</th><th>Цена</th><th>Кол-во</th><th>Сумма</th><th></th></tr>
      </thead>
      <tbody id="services-body"></tbody>
    </table>
    <div style="padding: 15px; text-align: center; border-top: 1px solid var(--border);">
      <button class="btn btn-outline" onclick="addCustomWorkRow()" style="padding: 8px 16px; font-size: 0.9rem;">➕ Добавить свою позицию</button>
    </div>
  </div>

  <!-- Переключатель закупки -->
  <div class="purchase-toggle">
    <input type="checkbox" id="master-buys-materials" checked onchange="calculateTotals()">
    <label for="master-buys-materials">Материалы закупает Мастер (входят в итоговую сумму)</label>
  </div>

  <!-- Таблица Материалов -->
  <div class="table-wrapper">
    <div style="padding: 12px 15px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
      <span style="color: var(--primary); font-weight: 600;">📦 Материалы (Авто-подбор)</span>
      <button class="btn btn-outline" onclick="addMaterialRow()" style="padding: 4px 10px; font-size: 0.8rem;">+ Вручную</button>
    </div>
    <table>
      <thead>
      <tr><th>Наименование</th><th>Ед.</th><th>Цена</th><th>Кол-во</th><th>Сумма</th><th></th></tr>
      </thead>
      <tbody id="materials-body"></tbody>
    </table>
  </div>

  <!-- Итоги -->
  <div class="summary">
    <div class="summary-row"><span>Стоимость работ:</span><span id="services-total-display">0 ₽</span></div>

    <div class="discount-block">
      <label for="discount-input" style="color: var(--text-muted); font-size: 0.9rem;">Скидка:</label>
      <input type="text" id="discount-input" placeholder="0 ₽ или %" oninput="calculateTotals()">
      <span id="discount-value-display" style="color: var(--danger); font-weight: 600; margin-left: auto;">-0 ₽</span>
    </div>

    <div class="summary-row" style="font-weight: bold; color: var(--text);"><span>Итого за работы:</span><span id="works-subtotal-display">0 ₽</span></div>

    <div class="summary-row" id="materials-summary-row"><span>Стоимость материалов:</span><span id="materials-total-display">0 ₽</span></div>

    <div class="summary-total"><span>К ОПЛАТЕ:</span><span id="grand-total">0 ₽</span></div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="generatePDF()">📄 Скачать PDF</button>
    <button class="btn btn-outline" onclick="clearForm()">🗑 Очистить всё</button>
  </div>
</div>

<script>
  // --- ДАННЫЕ (ОБНОВЛЕННЫЙ ПРАЙС) ---
  const servicesData = [
    { name: 'Штробление: газобетон/пеноблок', unit: 'м.п.', price: 380 },
    { name: 'Штробление: кирпич', unit: 'м.п.', price: 480 },
    { name: 'Штробление: бетон', unit: 'м.п.', price: 580 },
    { name: 'Прокладка кабеля до 6 мм² (в гофре)', unit: 'м.п.', price: 140 },
    { name: 'Прокладка кабеля до 6 мм² (без гофры)', unit: 'м.п.', price: 110 },
    { name: 'Прокладка кабеля от 10 мм² (силовой)', unit: 'м.п.', price: 220 },
    { name: 'Отверстие под подрозетник (любое основание)', unit: 'шт.', price: 600 }, // Усредненная цена
    { name: 'Монтаж подрозетника (вмазка)', unit: 'шт.', price: 220 },
    { name: 'Установка механизма розетки/выключателя', unit: 'шт.', price: 450 },
    { name: 'Розетка/выключатель «под ключ»', unit: 'шт.', price: 850 },
    { name: 'Монтаж светильника (до 5 кг)', unit: 'шт.', price: 900 },
    { name: 'Сборка электрощита (за модуль)', unit: 'мод.', price: 580 },
    { name: 'Установка и подключение автомата 1P/2P/3P', unit: 'шт.', price: 450 },
    { name: 'Подключение варочной панели / духовки', unit: 'шт.', price: 1600 },
    { name: 'Подключение бойлера / стиральной машины', unit: 'шт.', price: 1200 },
    { name: 'Диагностика / Аварийный выезд', unit: 'выезд', price: 1100 }
  ];

  // Правила авто-добавления материалов
  const materialRules = {
    'Прокладка кабеля до 6 мм² (в гофре)': [
      { name: 'Гофра ПВХ 20мм', unit: 'м.п.', price: 15, coef: 1.0 },
      { name: 'Клипса для гофры 20мм', unit: 'шт.', price: 5, coef: 2.0 }
    ],
    'Прокладка кабеля до 6 мм² (без гофры)': [
      { name: 'Дюбель-хомут для кабеля', unit: 'шт.', price: 3, coef: 2.0 }
    ],
    'Прокладка кабеля от 10 мм² (силовой)': [
      { name: 'Гофра ПВХ 25мм', unit: 'м.п.', price: 25, coef: 1.0 },
      { name: 'Клипса для гофры 25мм', unit: 'шт.', price: 7, coef: 2.0 }
    ],
    'Штробление: газобетон/пеноблок': [
      { name: 'Смесь для заделки штроб (алебастр)', unit: 'кг', price: 50, coef: 0.5 }
    ],
    'Штробление: кирпич': [
      { name: 'Смесь для заделки штроб (алебастр)', unit: 'кг', price: 50, coef: 0.5 }
    ],
    'Штробление: бетон': [
      { name: 'Смесь для заделки штроб (алебастр)', unit: 'кг', price: 50, coef: 0.5 }
    ],
    'Монтаж подрозетника (вмазка)': [
      { name: 'Подрозетник универсальный', unit: 'шт.', price: 30, coef: 1.0 }
    ],
    'Розетка/выключатель «под ключ»': [
      { name: 'Подрозетник универсальный', unit: 'шт.', price: 30, coef: 1.0 }
    ],
    'Сборка электрощита (за модуль)': [
      { name: 'Шина нулевая/земляная', unit: 'шт.', price: 150, coef: 0.1 },
      { name: 'Гребенка соединительная', unit: 'шт.', price: 400, coef: 0.1 },
      { name: 'Заглушка для щита', unit: 'шт.', price: 20, coef: 0.5 }
    ]
  };

  // --- РЕНДЕРИНГ ---
  const tbodyServices = document.getElementById('services-body');

  function renderServices() {
    tbodyServices.innerHTML = '';
    servicesData.forEach((s, index) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
          <td>${s.name}</td>
          <td>${s.unit}</td>
          <td>${s.price.toLocaleString('ru-RU')} ₽</td>
          <td><input type="number" class="qty-input" id="qty-${index}" min="0" step="0.5" placeholder="0" onchange="handleServiceChange(${index}, this.value)"></td>
          <td id="sum-${index}" style="text-align:center; font-weight:600;">0 ₽</td>
          <td></td>
        `;
      tbodyServices.appendChild(tr);
    });
  }
  renderServices();

  // --- ЛОГИКА ---

  function handleServiceChange(index, qty) {
    calculateTotals();

    const serviceName = servicesData[index].name;
    const rules = materialRules[serviceName];
    if (!rules) return;

    const workQty = parseFloat(qty) || 0;

    rules.forEach(rule => {
      let existingRow = null;
      const matRows = document.querySelectorAll('#materials-body tr');

      matRows.forEach(row => {
        const nameInput = row.querySelector('.mat-name');
        if (nameInput && nameInput.value === rule.name) {
          existingRow = row;
        }
      });

      const requiredQty = Math.ceil(workQty * rule.coef);

      if (requiredQty > 0) {
        if (existingRow) {
          const qtyInput = existingRow.querySelector('.mat-qty');
          const currentVal = parseFloat(qtyInput.value) || 0;
          if (currentVal < requiredQty) {
            qtyInput.value = requiredQty;
          }
        } else {
          addMaterialRow(rule.name, rule.price, requiredQty);
        }
      }
    });
    calculateTotals();
  }

  function addCustomWorkRow() {
    const row = document.createElement('tr');
    row.classList.add('custom-work-row');
    row.innerHTML = `
        <td><input type="text" class="name-input" placeholder="Название работы"></td>
        <td><input type="text" class="mat-unit" value="шт." style="width:50px;"></td>
        <td><input type="number" class="mat-price" placeholder="0" min="0" onchange="calculateTotals()" style="width:70px;"></td>
        <td><input type="number" class="mat-qty" placeholder="0" min="0" onchange="calculateTotals()" style="width:60px;"></td>
        <td style="text-align:center; font-weight:600;">0 ₽</td>
        <td style="text-align:center;"><button class="btn-remove" onclick="this.closest('tr').remove(); calculateTotals()">✕</button></td>
      `;
    tbodyServices.appendChild(row);
  }

  function addMaterialRow(name = '', price = 0, qty = 0) {
    const matBody = document.getElementById('materials-body');
    const row = document.createElement('tr');
    row.innerHTML = `
        <td><input type="text" class="mat-name" value="${name}" placeholder="Материал"></td>
        <td><input type="text" class="mat-unit" value="шт." style="width:50px;"></td>
        <td><input type="number" class="mat-price" value="${price}" placeholder="0" min="0" onchange="calculateTotals()" style="width:70px;"></td>
        <td><input type="number" class="mat-qty" value="${qty}" placeholder="0" min="0" onchange="calculateTotals()" style="width:60px;"></td>
        <td style="text-align:center; font-weight:600;">0 ₽</td>
        <td style="text-align:center;"><button class="btn-remove" onclick="this.closest('tr').remove(); calculateTotals()">✕</button></td>
      `;
    matBody.appendChild(row);
  }

  function calculateTotals() {
    let servicesTotal = 0;

    servicesData.forEach((s, index) => {
      const qtyInput = document.getElementById(`qty-${index}`);
      const sumCell = document.getElementById(`sum-${index}`);
      const qty = parseFloat(qtyInput.value) || 0;
      const sum = qty * s.price;
      sumCell.textContent = sum.toLocaleString('ru-RU') + ' ₽';
      servicesTotal += sum;
    });

    document.querySelectorAll('.custom-work-row').forEach(row => {
      const priceInput = row.querySelector('.mat-price');
      const qtyInput = row.querySelector('.mat-qty');
      const sumCell = row.querySelector('td:nth-child(5)');
      const price = parseFloat(priceInput.value) || 0;
      const qty = parseFloat(qtyInput.value) || 0;
      const sum = price * qty;
      sumCell.textContent = sum.toLocaleString('ru-RU') + ' ₽';
      servicesTotal += sum;
    });

    // Скидка
    const discountInput = document.getElementById('discount-input').value.trim();
    let discountAmount = 0;
    let discountPercent = 0;

    if (discountInput) {
      if (discountInput.includes('%')) {
        discountPercent = parseFloat(discountInput.replace('%', '')) || 0;
        discountAmount = servicesTotal * (discountPercent / 100);
      } else {
        discountAmount = parseFloat(discountInput) || 0;
      }
    }
    discountAmount = Math.round(discountAmount);
    const worksFinal = Math.max(0, servicesTotal - discountAmount);

    // Материалы
    let materialsTotal = 0;
    document.querySelectorAll('#materials-body tr').forEach(row => {
      const priceInput = row.querySelector('.mat-price');
      const qtyInput = row.querySelector('.mat-qty');
      const sumCell = row.querySelector('td:nth-child(5)');
      const price = parseFloat(priceInput.value) || 0;
      const qty = parseFloat(qtyInput.value) || 0;
      const sum = price * qty;
      sumCell.textContent = sum.toLocaleString('ru-RU') + ' ₽';
      materialsTotal += sum;
    });

    const masterBuys = document.getElementById('master-buys-materials').checked;
    const materialsToPay = masterBuys ? materialsTotal : 0;
    const grandTotal = worksFinal + materialsToPay;

    // Обновление UI
    document.getElementById('services-total-display').textContent = servicesTotal.toLocaleString('ru-RU') + ' ₽';

    // Отображение скидки с процентом, если он был введен
    let discountText = `-${discountAmount.toLocaleString('ru-RU')} ₽`;
    if (discountPercent > 0) {
      discountText = `${discountPercent}% (${discountText})`;
    }
    document.getElementById('discount-value-display').textContent = discountText;

    document.getElementById('works-subtotal-display').textContent = worksFinal.toLocaleString('ru-RU') + ' ₽';
    document.getElementById('materials-total-display').textContent = materialsTotal.toLocaleString('ru-RU') + ' ₽';
    document.getElementById('grand-total').textContent = grandTotal.toLocaleString('ru-RU') + ' ₽';

    const matRow = document.getElementById('materials-summary-row');
    if (!masterBuys) {
      matRow.style.opacity = '0.5';
      matRow.style.textDecoration = 'line-through';
    } else {
      matRow.style.opacity = '1';
      matRow.style.textDecoration = 'none';
    }

    return { servicesTotal, discountAmount, discountPercent, worksFinal, materialsTotal, materialsToPay, grandTotal };
  }

  // --- ЧЕРНОВИКИ ---
  function saveDraft() {
    const name = document.getElementById('draft-name').value.trim();
    if (!name) { alert('Введите название черновика'); return; }

    const data = {
      clientName: document.getElementById('client-name').value,
      clientAddress: document.getElementById('client-address').value,
      date: document.getElementById('estimate-date').value,
      invoiceNum: document.getElementById('invoice-number').value,
      masterBuys: document.getElementById('master-buys-materials').checked,
      discount: document.getElementById('discount-input').value,
      services: servicesData.map((s, i) => ({ qty: document.getElementById(`qty-${i}`).value })),
      customWorks: Array.from(document.querySelectorAll('.custom-work-row')).map(row => ({
        name: row.querySelector('.name-input').value,
        unit: row.querySelector('.mat-unit').value,
        price: row.querySelector('.mat-price').value,
        qty: row.querySelector('.mat-qty').value
      })),
      materials: Array.from(document.querySelectorAll('#materials-body tr')).map(row => ({
        name: row.querySelector('.mat-name').value,
        unit: row.querySelector('.mat-unit').value,
        price: row.querySelector('.mat-price').value,
        qty: row.querySelector('.mat-qty').value
      }))
    };

    localStorage.setItem(`vg_draft_${name}`, JSON.stringify(data));
    updateDraftList();
    alert(`Черновик "${name}" сохранен!`);
  }

  function loadDraft() {
    const name = document.getElementById('draft-select').value;
    if (!name) return;

    const data = JSON.parse(localStorage.getItem(`vg_draft_${name}`));
    if (!data) return;

    document.getElementById('client-name').value = data.clientName || '';
    document.getElementById('client-address').value = data.clientAddress || '';
    document.getElementById('estimate-date').value = data.date || '';
    document.getElementById('invoice-number').value = data.invoiceNum || '';
    document.getElementById('master-buys-materials').checked = data.masterBuys !== false;
    document.getElementById('discount-input').value = data.discount || '';

    data.services.forEach((s, i) => {
      const input = document.getElementById(`qty-${i}`);
      if (input) input.value = s.qty;
    });

    document.querySelectorAll('.custom-work-row').forEach(r => r.remove());
    data.customWorks.forEach(w => {
      addCustomWorkRow();
      const lastRow = document.querySelector('.custom-work-row:last-child');
      lastRow.querySelector('.name-input').value = w.name;
      lastRow.querySelector('.mat-unit').value = w.unit;
      lastRow.querySelector('.mat-price').value = w.price;
      lastRow.querySelector('.mat-qty').value = w.qty;
    });

    document.getElementById('materials-body').innerHTML = '';
    data.materials.forEach(m => {
      addMaterialRow(m.name, m.price, m.qty);
    });

    calculateTotals();
  }

  function deleteDraft() {
    const name = document.getElementById('draft-select').value;
    if (!name) return;
    if (confirm(`Удалить черновик "${name}"?`)) {
      localStorage.removeItem(`vg_draft_${name}`);
      updateDraftList();
      document.getElementById('draft-select').value = '';
    }
  }

  function updateDraftList() {
    const select = document.getElementById('draft-select');
    select.innerHTML = '<option value="">📂 Загрузить...</option>';
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key.startsWith('vg_draft_')) {
        const name = key.replace('vg_draft_', '');
        select.innerHTML += `<option value="${name}">${name}</option>`;
      }
    }
  }

  function clearForm() {
    if(!confirm('Очистить все поля?')) return;
    document.querySelectorAll('.qty-input').forEach(i => i.value = '');
    document.querySelectorAll('.mat-price, .mat-qty').forEach(i => i.value = '');
    document.getElementById('services-body').innerHTML = '';
    renderServices();
    document.getElementById('materials-body').innerHTML = '';
    document.getElementById('discount-input').value = '';
    document.getElementById('client-name').value = '';
    document.getElementById('client-address').value = '';
    document.getElementById('estimate-date').valueAsDate = new Date();
    document.getElementById('invoice-number').value = '';
    document.getElementById('master-buys-materials').checked = true;
    calculateTotals();
  }

  // --- ГЕНЕРАЦИЯ PDF ---
  function generatePDF() {
    const totals = calculateTotals();
    if (totals.grandTotal === 0 && totals.materialsTotal === 0) {
      alert('Добавьте хотя бы одну позицию');
      return;
    }

    let invoiceNum = document.getElementById('invoice-number').value.trim();
    if (!invoiceNum) {
      let counter = parseInt(localStorage.getItem('vg_estimate_counter') || '0') + 1;
      localStorage.setItem('vg_estimate_counter', counter);
      invoiceNum = `${new Date().getFullYear()}-${String(counter).padStart(3, '0')}`;
      document.getElementById('invoice-number').value = invoiceNum;
    }

    const clientName = document.getElementById('client-name').value || '—';
    const clientAddr = document.getElementById('client-address').value || '—';
    const pdfDate = document.getElementById('estimate-date').value || new Date().toLocaleDateString('ru-RU');
    const executor = 'Матвей Зрячих | VoltGroup (Самозанятый)';
    const masterBuys = document.getElementById('master-buys-materials').checked;

    let pdfBodyHTML = '';
    let rowIdx = 1;

    // Работы
    servicesData.forEach((s, index) => {
      const qtyInput = document.getElementById(`qty-${index}`);
      const qty = parseFloat(qtyInput.value) || 0;
      if (qty > 0) {
        const sum = qty * s.price;
        pdfBodyHTML += `<tr><td>${rowIdx++}</td><td>${s.name}</td><td>${s.unit}</td><td>${qty}</td><td>${s.price} ₽</td><td>${sum.toLocaleString('ru-RU')} ₽</td></tr>`;
      }
    });
    document.querySelectorAll('.custom-work-row').forEach(row => {
      const name = row.querySelector('.name-input').value || 'Доп. работа';
      const unit = row.querySelector('.mat-unit').value || 'шт.';
      const price = parseFloat(row.querySelector('.mat-price').value) || 0;
      const qty = parseFloat(row.querySelector('.mat-qty').value) || 0;
      if (qty > 0 || price > 0) {
        const sum = price * qty;
        pdfBodyHTML += `<tr><td>${rowIdx++}</td><td>${name}</td><td>${unit}</td><td>${qty}</td><td>${price} ₽</td><td>${sum.toLocaleString('ru-RU')} ₽</td></tr>`;
      }
    });

    // Материалы (ВСЕГДА выводим список, но меняем заголовок и влияние на сумму)
    const matRows = document.querySelectorAll('#materials-body tr');
    let hasMaterials = false;
    matRows.forEach(r => {
      const qty = parseFloat(r.querySelector('.mat-qty').value) || 0;
      const price = parseFloat(r.querySelector('.mat-price').value) || 0;
      if (qty > 0 || price > 0) hasMaterials = true;
    });

    if (hasMaterials) {
      const matHeaderTitle = masterBuys ? "МАТЕРИАЛЫ (Закупка Исполнителя)" : "СПЕЦИФИКАЦИЯ МАТЕРИАЛОВ (Закупка Заказчика)";
      pdfBodyHTML += `<tr><td colspan="6" style="background:#f0f0f0; font-weight:bold; text-align:center; padding:8px; border:1px solid #ccc;">${matHeaderTitle}</td></tr>`;

      matRows.forEach(r => {
        const name = r.querySelector('.mat-name').value || 'Материал';
        const unit = r.querySelector('.mat-unit').value || 'шт.';
        const price = parseFloat(r.querySelector('.mat-price').value) || 0;
        const qty = parseFloat(r.querySelector('.mat-qty').value) || 0;
        if (qty > 0 || price > 0) {
          const sum = price * qty;
          // Если закупает заказчик, цену и сумму можно скрыть или показать как справочно.
          // Для прозрачности покажем цену, но в итог она не пойдет (это уже учтено в логике выше).
          pdfBodyHTML += `<tr><td>${rowIdx++}</td><td>${name}</td><td>${unit}</td><td>${qty}</td><td>${price} ₽</td><td>${sum.toLocaleString('ru-RU')} ₽</td></tr>`;
        }
      });
    }

    const printHTML = `
        <!DOCTYPE html>
        <html>
        <head>
          <title>Смета №${invoiceNum} | VoltGroup</title>
          <style>
            @media print { @page { margin: 10mm; size: A4; } body { -webkit-print-color-adjust: exact; } .no-print { display: none; } }
            body { font-family: Arial, sans-serif; padding: 0; color: #000; max-width: 210mm; margin: 0 auto; font-size: 12px; }
            h2 { text-align: center; margin: 0 0 15px 0; font-size: 18px; text-transform: uppercase; }
            .header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 2px solid #000; padding-bottom: 10px; }
            table { width: 100%; border-collapse: collapse; margin: 10px 0; }
            th, td { border: 1px solid #000; padding: 6px 8px; text-align: left; }
            th { background: #eee; font-weight: bold; }
            .total-block { margin: 20px 0; border-top: 2px solid #000; padding-top: 10px; text-align: right; }
            .total-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
            .total-final { font-size: 16px; font-weight: bold; margin-top: 10px; }
            .signature { margin-top: 40px; display: flex; justify-content: space-between; font-size: 12px; }
            .footer { margin-top: 30px; font-size: 10px; color: #555; text-align: center; border-top: 1px solid #ddd; padding-top: 10px; }
            .controls { text-align: center; margin: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px; border: 1px dashed #ccc; }
            .btn { padding: 10px 20px; margin: 5px; background: #00E5FF; color: #000; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
          </style>
        </head>
        <body>
          <div class="controls no-print">
            <h3>Предпросмотр печати</h3>
            <p>Нажмите кнопку ниже, чтобы сохранить как PDF или распечатать.</p>
            <button class="btn" onclick="window.print()">🖨 Печать / Сохранить PDF</button>
            <button class="btn" onclick="window.close()" style="background:#ccc;">Закрыть</button>
          </div>

          <h2>Смета № ${invoiceNum}</h2>
          <div class="header">
            <div><strong>Заказчик:</strong> ${clientName}<br><strong>Адрес:</strong> ${clientAddr}</div>
            <div style="text-align:right;"><strong>Дата:</strong> ${pdfDate}<br><strong>Исполнитель:</strong> ${executor}</div>
          </div>

          <table>
            <thead><tr><th style="width:30px">№</th><th>Наименование</th><th style="width:50px">Ед.</th><th style="width:50px">Кол-во</th><th style="width:70px">Цена</th><th style="width:80px">Сумма</th></tr></thead>
            <tbody>${pdfBodyHTML}</tbody>
          </table>

          <div class="total-block">
            <div class="total-row"><span>Итого работы:</span><span>${totals.worksFinal.toLocaleString('ru-RU')} ₽</span></div>
            ${totals.discountAmount > 0 ? `<div class="total-row" style="color:#d32f2f;"><span>Скидка ${totals.discountPercent > 0 ? '(' + totals.discountPercent + '%)' : ''}:</span><span>-${totals.discountAmount.toLocaleString('ru-RU')} ₽</span></div>` : ''}
            ${masterBuys ? `<div class="total-row"><span>Материалы:</span><span>${totals.materialsTotal.toLocaleString('ru-RU')} ₽</span></div>` : ''}
            <div class="total-final"><span>ИТОГО К ОПЛАТЕ:</span><span>${totals.grandTotal.toLocaleString('ru-RU')} ₽</span></div>
          </div>

          <div class="signature">
            <div>Заказчик: _______________ / _______________ /</div>
            <div>Исполнитель: _______________ / Матвей Зрячих /</div>
          </div>

          <div class="footer">
            ⚡ VoltGroup | Энергия решений | Самозанятый (НПД)<br>
            Гарантия на работы: 12 месяцев. Оплата производится после подписания акта приёмки.
          </div>
        </body>
        </html>
      `;

    const printWindow = window.open('', '_blank', 'width=900,height=900');
    printWindow.document.write(printHTML);
    printWindow.document.close();
  }

  // Инициализация
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('estimate-date').valueAsDate = new Date();
    updateDraftList();
  });
</script>
</body>
</html>
